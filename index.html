<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tequity — Secure Data Rooms</title>
<meta name="description" content="Tequity — Secure Data Rooms. Share your most sensitive documents with control." />
<link rel="icon" href="https://tequity.site/Logo.svg" />
<style>
  :root { --brand: #E2187D; --bg: #020617; --fg: #f8fafc; --muted: #94a3b8; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh; background:
      radial-gradient(1000px 500px at 50% -10%, rgba(226,24,125,0.25), transparent 70%),
      var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  main { max-width: 640px; padding: 2rem; text-align: center; }
  img.logo { width: 88px; height: 88px; border-radius: 20px; }
  h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin: 1.5rem 0 0.25rem; letter-spacing: -0.02em; }
  .tag { color: var(--brand); font-weight: 600; font-size: 1.25rem; margin: 0 0 1.25rem; }
  p.lede { color: var(--muted); font-size: 1.05rem; line-height: 1.6; margin: 0 auto 2rem; max-width: 32rem; }
  .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  a.btn { text-decoration: none; padding: 0.7rem 1.4rem; border-radius: 999px; font-weight: 600; font-size: 0.95rem; }
  a.primary { background: var(--brand); color: #fff; }
  a.ghost { border: 1px solid rgba(248,250,252,0.2); color: var(--fg); }
  footer { margin-top: 3rem; color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>
  <main>
    <img class="logo" src="profile/assets/logo.svg" alt="Tequity logo" />
    <h1>Tequity</h1>
    <p class="tag">Secure Data Rooms</p>
    <p class="lede">Share your most sensitive documents with control — granular access, complete audit trails, and a clean, modern workspace built for high-stakes deals.</p>
    <div class="actions">
      <a class="btn primary" href="https://tequity.site">Visit tequity.site</a>
      <a class="btn ghost" href="https://github.com/tequityapp">GitHub</a>
    </div>
    <footer>© Tequity. All rights reserved.</footer>
  </main>
</body>
</html>
